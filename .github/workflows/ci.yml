name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an older run of the same ref when a new one starts. PRs that get
# repeated force-pushes don't queue a second wasted run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: typecheck / compile / test (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Match @types/node ^22.10.5 declared in package.json so the
          # type-checked stdlib surface matches the runtime stdlib surface.
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

  package-check:
    # Verifies the .vsix can be built end-to-end against the actual
    # build output — catches broken `.vscodeignore`, missing LICENSE,
    # invalid manifest, etc. on every PR / push without producing a
    # release artefact.
    name: vsce package (verify .vsix can be built)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile (vsce won't run vscode:prepublish without out/)
        run: npm run compile

      - name: Build .vsix to /tmp
        run: npm run package:check
