name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an older run of the same ref when a new one starts. PRs that get
# repeated force-pushes don't queue a second wasted run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: typecheck / compile / test (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout bridge-vscode
        uses: actions/checkout@v4
        with:
          path: agent-hub-bridge-vscode

      # The SDK is consumed via `file:../agent-hub-sdk/js` (see
      # `package.json`). For CI we clone it next to bridge-vscode so
      # the relative path resolves the same way it does on a
      # developer's machine. `install-links=true` (in `.npmrc`) then
      # copies the SDK's published surface (`files: []`) into
      # `node_modules/`, sidestepping symlink-resolution surprises
      # under `vsce package`.
      - name: Checkout agent-hub-sdk (sibling)
        uses: actions/checkout@v4
        with:
          repository: kishibashi3/agent-hub-sdk
          ref: main
          path: agent-hub-sdk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Match @types/node ^22.10.5 declared in package.json so the
          # type-checked stdlib surface matches the runtime stdlib surface.
          cache: 'npm'
          cache-dependency-path: agent-hub-bridge-vscode/package-lock.json

      # Install the SDK's *own* devDeps (typescript, @types/node) before
      # bridge-vscode's `npm ci` triggers the SDK's `prepare` script
      # (= `tsc -p tsconfig.json`) via npm's `install-links=true` pack
      # step. Without this, prepare runs against an empty SDK node_modules/
      # and fails with "Cannot find name 'console' / 'process' /
      # 'AsyncDisposable'" — see #21 PR thread for the diagnosis trail.
      - name: Install agent-hub-sdk devDeps (for its `prepare` script)
        working-directory: agent-hub-sdk/js
        run: npm install

      - name: Install dependencies
        working-directory: agent-hub-bridge-vscode
        run: npm ci

      - name: Typecheck
        working-directory: agent-hub-bridge-vscode
        run: npm run typecheck

      - name: Lint
        working-directory: agent-hub-bridge-vscode
        run: npm run lint

      - name: Compile
        working-directory: agent-hub-bridge-vscode
        run: npm run compile

      - name: Test
        working-directory: agent-hub-bridge-vscode
        run: npm test

  package-check:
    # Verifies the .vsix can be built end-to-end against the actual
    # build output — catches broken `.vscodeignore`, missing LICENSE,
    # invalid manifest, etc. on every PR / push without producing a
    # release artefact.
    name: vsce package (verify .vsix can be built)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 5

    steps:
      - name: Checkout bridge-vscode
        uses: actions/checkout@v4
        with:
          path: agent-hub-bridge-vscode

      - name: Checkout agent-hub-sdk (sibling)
        uses: actions/checkout@v4
        with:
          repository: kishibashi3/agent-hub-sdk
          ref: main
          path: agent-hub-sdk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent-hub-bridge-vscode/package-lock.json

      # Same SDK-devDeps-first step as the build-and-test job — vsce
      # packaging also re-runs the SDK's `prepare` via npm's
      # install-links pack flow, so it needs typescript + @types/node
      # available in `agent-hub-sdk/js/node_modules/` first.
      - name: Install agent-hub-sdk devDeps (for its `prepare` script)
        working-directory: agent-hub-sdk/js
        run: npm install

      - name: Install dependencies
        working-directory: agent-hub-bridge-vscode
        run: npm ci

      - name: Compile (vsce won't run vscode:prepublish without out/)
        working-directory: agent-hub-bridge-vscode
        run: npm run compile

      - name: Build .vsix to /tmp
        working-directory: agent-hub-bridge-vscode
        run: npm run package:check
